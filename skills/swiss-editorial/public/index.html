<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss Editorial - 社论风排版工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: #1a1a1a;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* 右侧编辑器 */
        .editor-panel {
            width: 35%;
            background: #252525;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #333;
        }

        /* 左侧目录面板 */
        .toc-panel {
            width: 15%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
            min-width: 180px;
        }

        .toc-header {
            padding: 16px 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
        }

        .toc-header h2 {
            font-size: 14px;
            font-weight: 500;
            color: #888;
            letter-spacing: 0.05em;
        }

        .toc-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
        }

        .toc-page {
            margin-bottom: 4px;
        }

        .toc-page-header {
            padding: 10px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ccc;
            font-size: 13px;
            transition: all 0.2s;
            border-left: 2px solid transparent;
        }

        .toc-page-header:hover {
            background: #252525;
            color: #d95e00;
        }

        .toc-page.active .toc-page-header {
            background: #252525;
            border-left-color: #d95e00;
            color: #d95e00;
        }

        .toc-page-number {
            font-size: 11px;
            font-weight: 600;
            color: #666;
            min-width: 32px;
        }

        .toc-page.active .toc-page-number {
            color: #d95e00;
        }

        .toc-page-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .toc-page-preview {
            font-size: 10px;
            color: #666;
            margin-left: 8px;
        }

        .toc-elements {
            padding: 4px 0 8px 62px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .toc-element {
            padding: 4px 12px;
            color: #666;
            cursor: pointer;
            font-size: 11px;
            border-radius: 3px;
            transition: all 0.2s;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .toc-element:hover {
            color: #d95e00;
            background: #252525;
        }

        .toc-element.active {
            color: #d95e00;
            background: rgba(217, 94, 0, 0.15);
            font-weight: 500;
        }

        .editor-header {
            padding: 16px 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-header h1 {
            font-size: 14px;
            font-weight: 500;
            color: #888;
            letter-spacing: 0.05em;
        }

        .editor-header span {
            font-size: 12px;
            color: #666;
        }

        /* 编辑器工具栏 */
        .editor-toolbar {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
        }

        .editor-toolbar button {
            background: #333;
            border: 1px solid #444;
            color: #ccc;
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .editor-toolbar button:hover {
            background: #444;
            border-color: #d95e00;
            color: #d95e00;
        }

        .editor-toolbar button.primary {
            background: #d95e00;
            border-color: #d95e00;
            color: #fff;
        }

        .editor-toolbar button.primary:hover {
            background: #e86d0f;
        }

        .editor-toolbar .filename {
            flex: 1;
            text-align: right;
            color: #888;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
        }

        .editor-toolbar .filename .unsaved {
            color: #d95e00;
        }

        /* 保存状态指示器 */
        .save-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #666;
        }

        .save-status.saved {
            color: #28a745;
        }

        .save-status.unsaved {
            color: #d95e00;
        }

        /* 隐藏的文件输入 */
        #fileInput {
            display: none;
        }


        #editor {
            flex: 1;
            width: 100%;
            padding: 24px;
            background: #252525;
            color: #e0e0e0;
            border: none;
            resize: none;
            font-family: 'JetBrains Mono', 'SF Mono', monospace;
            font-size: 14px;
            line-height: 1.8;
            outline: none;
        }

        #editor::placeholder {
            color: #555;
        }

        /* 中间预览 */
        .preview-panel {
            width: 50%;
            background: #0d0d0d;
            overflow-y: auto;
            padding: 40px;
            border-right: 1px solid #333;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .preview-header h2 {
            font-size: 14px;
            font-weight: 400;
            color: #666;
            letter-spacing: 0.05em;
        }

        .page-count {
            font-size: 12px;
            color: #d95e00;
            font-weight: 500;
        }

        /* 搜索框样式 */
        .search-container {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #1a1a1a;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #333;
            margin-right: auto;
        }

        .search-container input {
            background: transparent;
            border: none;
            color: #e0e0e0;
            font-size: 12px;
            width: 100px;
            outline: none;
        }

        .search-container input::placeholder {
            color: #666;
        }

        .search-container button {
            background: #333;
            border: 1px solid #444;
            color: #888;
            cursor: pointer;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .search-container button:hover {
            color: #d95e00;
            border-color: #d95e00;
        }

        .search-results {
            font-size: 10px;
            color: #888;
            margin-left: 4px;
            min-width: 40px;
            text-align: center;
        }

        /* 高亮搜索结果 */
        .search-highlight {
            background: #d95e00 !important;
            color: #fff !important;
            padding: 2px 4px;
            border-radius: 2px;
        }

        /* 当前搜索结果高亮 */
        .search-highlight-current {
            background: #ff8c00 !important;
            color: #fff !important;
            box-shadow: 0 0 0 2px #ff8c00;
        }

        /* 卡片容器 */
        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        /* Swiss Card 样式 */
        .swiss-card {
            width: 600px;
            min-height: 800px;
            border-radius: 0 !important;
            overflow: hidden;
            position: relative;
            font-family: 'Noto Sans SC', 'Noto Serif SC', -apple-system, sans-serif;
            flex-shrink: 0;
        }

        .swiss-card--cover {
            background: #f2efe9;
            color: #1a1a1a;
        }

        .swiss-card--body {
            background: #ffffff;
            color: #1a1a1a;
        }

        .swiss-card__content {
            padding: 60px;
            min-height: 800px;
            display: flex;
            flex-direction: column;
        }

        .swiss-card--cover .swiss-card__content {
            justify-content: center;
        }

        /* 标题 - 封面 */
        .swiss-card h1 {
            font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', serif !important;
            font-size: 52px;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
            color: #1a1a1a;
        }

        /* H2 - 章节标题，带底部边框 */
        .swiss-card h2 {
            font-family: 'Noto Sans SC', -apple-system, sans-serif !important;
            font-size: 34px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 3px solid #d95e00;
            color: #d95e00;
        }

        /* H3 */
        .swiss-card h3 {
            font-family: 'Noto Sans SC', -apple-system, sans-serif !important;
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 16px;
            color: #d95e00;
        }

        /* H4 */
        .swiss-card h4 {
            font-family: 'Noto Sans SC', -apple-system, sans-serif !important;
            font-size: 22px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 14px;
            color: #d95e00;
        }

        /* H5 */
        .swiss-card h5 {
            font-family: 'Noto Sans SC', -apple-system, sans-serif !important;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 12px;
            color: #d95e00;
        }

        /* H6 */
        .swiss-card h6 {
            font-family: 'Noto Sans SC', -apple-system, sans-serif !important;
            font-size: 16px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 10px;
            color: #d95e00;
        }

        /* 正文 */
        .swiss-card p {
            font-size: 17px;
            font-weight: 300;
            line-height: 1.8;
            margin-bottom: 16px;
            text-align: justify;
            color: #1a1a1a;
        }

        /* 加粗 */
        .swiss-card strong {
            font-weight: 700;
            color: #d95e00;
        }

        /* 强调 */
        .swiss-card em {
            font-style: italic;
            color: #d95e00;
        }

        /* 引用 */
        .swiss-card blockquote {
            margin: 32px 0;
            padding: 0 0 0 24px;
            border-left: 3px solid #d95e00;
            font-size: 16px;
            font-weight: 400;
            line-height: 1.8;
            color: #444;
            letter-spacing: 0.02em;
        }

        .swiss-card blockquote p {
            margin-bottom: 12px;
            text-align: left;
        }

        .swiss-card blockquote p:last-child {
            margin-bottom: 0;
        }

        /* 代码块 - macOS 窗口风格 */
        .swiss-card .code-block {
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            margin: 24px 0;
        }

        .swiss-card .code-header {
            background: #2b2b43;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
        }

        .swiss-card .code-dots {
            display: flex;
            gap: 6px;
        }

        .swiss-card .code-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .swiss-card .code-dot.red { background: #ff5f56; }
        .swiss-card .code-dot.yellow { background: #ffbd2e; }
        .swiss-card .code-dot.green { background: #27c93f; }

        .swiss-card .code-lang {
            margin-left: auto;
            font-size: 12px;
            color: #a9afc5;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .swiss-card pre {
            background: #1a1a2e;
            color: #e4e4e7;
            padding: 16px 20px;
            margin: 0;
            font-family: 'SF Mono', 'JetBrains Mono', Monaco, monospace;
            font-size: 14px;
            line-height: 1.7;
            overflow-x: auto;
            border-radius: 0 0 12px 12px;
        }

        .swiss-card code {
            font-family: 'SF Mono', 'JetBrains Mono', Monaco, monospace;
        }

        .swiss-card pre code {
            background: none;
            padding: 0;
        }

        .swiss-card p code {
            background: rgba(217, 94, 0, 0.1);
            color: #d95e00;
            padding: 3px 10px;
            font-size: 15px;
            border-radius: 4px;
        }

        /* 链接 */
        .swiss-card a {
            color: #d95e00;
            text-decoration: none;
            border-bottom: 1px solid #d95e00;
        }

        /* 列表 */
        .swiss-card ul, .swiss-card ol {
            margin: 24px 0;
            padding-left: 32px;
        }

        .swiss-card li {
            font-size: 17px;
            font-weight: 300;
            line-height: 1.8;
            margin-bottom: 8px;
        }

        .swiss-card ul li::marker {
            color: #d95e00;
        }

        /* 分割线 */
        .swiss-card hr {
            border: none;
            height: 2px;
            background: #d95e00;
            margin: 36px 0;
            width: 80px;
            margin-left: 0;
        }

        /* 图片 */
        .swiss-card img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 24px auto;
        }

        /* 表格 */
        .swiss-card table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
            font-size: 15px;
        }

        .swiss-card th, .swiss-card td {
            padding: 14px 18px;
            text-align: left;
            border-bottom: 1px solid rgba(26, 26, 26, 0.1);
        }

        .swiss-card th {
            font-weight: 700;
            color: #d95e00;
            background: rgba(217, 94, 0, 0.05);
        }

        /* 极简表格样式 - 可通过 table.alt 类使用 */
        .swiss-card table.alt {
            border-top: 2px solid #1a1a1a;
            border-bottom: 2px solid #1a1a1a;
        }

        .swiss-card table.alt th {
            color: #1a1a1a;
            background: none;
            border-bottom: 1px solid #1a1a1a;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-size: 13px;
        }

        .swiss-card table.alt td {
            border-bottom: 1px solid rgba(26, 26, 26, 0.08);
        }

        .swiss-card table.alt tr:last-child td {
            border-bottom: none;
        }

        /* 封面元信息 */
        .cover-meta {
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #d95e00;
            margin-top: auto;
        }

        .cover-date {
            font-size: 13px;
            color: #666;
            margin-top: 16px;
        }

        /* 分隔提示 */
        .divider-hint {
            text-align: center;
            color: #444;
            font-size: 12px;
            padding: 8px;
        }

        /* ===== PPT 布局样式 ===== */
        .swiss-card .layout-grid {
            display: grid;
            gap: 20px;
            margin: 20px 0;
        }

        /* 2列布局 */
        .swiss-card .two-col {
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        /* 3列布局 */
        .swiss-card .three-col {
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        /* 左右对比布局 */
        .swiss-card .vs-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 16px;
        }
        .swiss-card .vs-grid .vs-divider {
            font-size: 24px;
            color: #d95e00;
            font-weight: 700;
        }

        /* 流程链 */
        .swiss-card .process-chain {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin: 20px 0;
        }
        .swiss-card .process-chain .step {
            flex: 1;
            text-align: center;
            padding: 16px 8px;
            background: rgba(217,94,0,0.05);
            border-radius: 8px;
            font-size: 14px;
        }
        .swiss-card .process-chain .arrow {
            color: #d95e00;
            font-size: 20px;
        }
        /* 6步骤双行布局 - 顺时针环绕 */
        .swiss-card .process-chain[data-type="wrap"] {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, auto);
            grid-template-areas:
                "s1 s2 s3"
                "s6 s5 s4";
            gap: 24px 32px;
            position: relative;
            padding: 10px 20px;
            overflow: visible;
        }
        .swiss-card .process-chain[data-type="wrap"] .step {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 12px;
            background: rgba(217,94,0,0.08);
            border: 2px solid #d95e00;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }
        .swiss-card .process-chain[data-type="wrap"] .arrow {
            display: none;
        }
        /* 步骤定位 - 顺时针环绕 */
        .swiss-card .process-chain[data-type="wrap"] .step:nth-child(1) { grid-area: s1; }
        .swiss-card .process-chain[data-type="wrap"] .step:nth-child(3) { grid-area: s2; }
        .swiss-card .process-chain[data-type="wrap"] .step:nth-child(5) { grid-area: s3; }
        .swiss-card .process-chain[data-type="wrap"] .step:nth-child(7) { grid-area: s4; }
        .swiss-card .process-chain[data-type="wrap"] .step:nth-child(9) { grid-area: s5; }
        .swiss-card .process-chain[data-type="wrap"] .step:nth-child(11) { grid-area: s6; }

        /* 第一行右箭头：1→2, 2→3 */
        .swiss-card .process-chain[data-type="wrap"] .step:nth-child(1)::after,
        .swiss-card .process-chain[data-type="wrap"] .step:nth-child(3)::after {
            content: '→';
            position: absolute;
            right: -26px;
            top: 50%;
            transform: translateY(-50%);
            color: #d95e00;
            font-size: 16px;
            font-weight: bold;
        }
        /* 3→4 向下箭头（设计→开发） */
        .swiss-card .process-chain[data-type="wrap"] .step:nth-child(5)::after {
            content: '↓';
            position: absolute;
            right: 50%;
            bottom: -26px;
            transform: translateX(50%);
            color: #d95e00;
            font-size: 16px;
            font-weight: bold;
        }
        /* 第二行左箭头：开发(s4)←测试(s5), 测试(s5)←上线(s6) */
        .swiss-card .process-chain[data-type="wrap"] .step:nth-child(7)::after,
        .swiss-card .process-chain[data-type="wrap"] .step:nth-child(9)::after {
            content: '←';
            position: absolute;
            left: -26px;
            top: 50%;
            transform: translateY(-50%);
            color: #d95e00;
            font-size: 16px;
            font-weight: bold;
            z-index: 2;
        }

        /* 流程链 - 彩色箭头形状变体 */
        .swiss-card .process-chain[data-type="arrow"] {
            display: flex;
            align-items: center;
            gap: 0;
            margin: 20px 0;
        }
        .swiss-card .process-chain[data-type="arrow"] .arrow {
            display: none;
        }
        .swiss-card .process-chain[data-type="arrow"] .step {
            flex: 1;
            text-align: center;
            padding: 16px 8px;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            position: relative;
            margin-right: 8px;
            border-radius: 0 !important;
            clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 50%, calc(100% - 12px) 100%, 0 100%, 12px 50%);
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 52px;
            overflow: hidden;
        }
        .swiss-card .process-chain[data-type="arrow"] .step:first-child {
            clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 50%, calc(100% - 12px) 100%, 0 100%);
            border-radius: 0 !important;
            padding-left: 12px;
        }
        .swiss-card .process-chain[data-type="arrow"] .step:last-child {
            clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 50%, calc(100% - 12px) 100%, 0 100%, 12px 50%);
            margin-right: 0;
            border-radius: 0 !important;
            padding-left: 18px;
            padding-right: 18px;
        }
        /* 步骤颜色 - 彩虹渐变 */
        .swiss-card .process-chain[data-type="arrow"] .step:nth-child(1) { background: rgb(181, 135, 255); }
        .swiss-card .process-chain[data-type="arrow"] .step:nth-child(3) { background: rgb(76, 181, 249); }
        .swiss-card .process-chain[data-type="arrow"] .step:nth-child(5) { background: rgb(83, 184, 219); }
        .swiss-card .process-chain[data-type="arrow"] .step:nth-child(7) { background: rgb(85, 186, 124); }
        .swiss-card .process-chain[data-type="arrow"] .step:nth-child(9) { background: rgb(245, 166, 35); }

        /* 5步骤变体 - 缩小字体和padding以适应宽度 */
        .swiss-card .process-chain[data-type="arrow"]:has(.step:nth-child(9)) .step {
            font-size: 11px;
            padding: 12px 4px;
            min-height: 44px;
        }
        .swiss-card .process-chain[data-type="arrow"]:has(.step:nth-child(9)) .step:first-child {
            padding-left: 8px;
        }
        .swiss-card .process-chain[data-type="arrow"]:has(.step:nth-child(9)) .step:last-child {
            padding-left: 12px;
            padding-right: 12px;
        }

        /* 循环流程 */

        /* 同心层 - 圆叠加 */
        .swiss-card .concentric {
            position: relative;
            height: 260px;
            margin: 12px 0;
        }
        .swiss-card .concentric .layer {
            position: absolute;
            left: 50%;
            border-radius: 50%;
            border: 2px solid #d95e00;
            background: rgba(217,94,0,0.05);
            font-size: 12px;
            font-weight: 600;
            color: #d95e00;
            transform: translateX(-50%);
        }
        /* 圆环尺寸 */
        .swiss-card .concentric .layer-1 { width: 100px; height: 100px; z-index: 3; }
        .swiss-card .concentric .layer-2 { width: 180px; height: 180px; z-index: 2; }
        .swiss-card .concentric .layer-3 { width: 260px; height: 260px; z-index: 1; }

        /* 文字基础样式 - 水平居中 */
        .swiss-card .concentric .layer-text {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 12px;
            font-weight: 600;
            color: #d95e00;
        }

        /* ========== 中心对齐 ========== */
        /* 所有圆心重合在容器中心 */
        .swiss-card .concentric.align-center .layer { top: 50%; transform: translate(-50%, -50%); }
        /* 文字在各自圆环的中间位置:
         * layer-1: 在圆心 (0px 从圆心，因为是内圈中心)
         * layer-2: 在 layer-1 和 layer-2 中间 = (50+90)/2 = 70px 从圆心
         * layer-3: 在 layer-2 和 layer-3 中间 = (90+130)/2 = 110px 从圆心
         */
        .swiss-card .concentric.align-center .layer-1 .layer-text { top: 50%; transform: translate(-50%, -50%); }
        .swiss-card .concentric.align-center .layer-2 .layer-text { top: calc(50% - 70px); transform: translate(-50%, -50%); }
        .swiss-card .concentric.align-center .layer-3 .layer-text { top: calc(50% - 110px); transform: translate(-50%, -50%); }

        /* ========== 顶部对齐 ========== */
        /* 圆顶对齐 */
        .swiss-card .concentric.align-top .layer { top: 0; transform: translateX(-50%); }
        /* 文字在各自圆环的中间:
         * layer-1: 在 100px 圆的中心 = 50px 从顶部
         * layer-2: 在 layer-1(100px) 和 layer-2(180px) 中间 = 50 + 40/2 = 70px 从顶部
         * layer-3: 在 layer-2(180px) 和 layer-3(260px) 中间 = 90 + 40/2 = 110px 从顶部
         */
        .swiss-card .concentric.align-top .layer-1 .layer-text { top: 50px; transform: translate(-50%, -50%); }
        .swiss-card .concentric.align-top .layer-2 .layer-text { top: 140px; transform: translate(-50%, -50%); }
        .swiss-card .concentric.align-top .layer-3 .layer-text { top: 220px; transform: translate(-50%, -50%); }

        /* ========== 底部对齐 ========== */
        /* 圆底对齐 - 整体旋转180度，与顶部对齐对应 */
        .swiss-card .concentric.align-bottom .layer { bottom: 0; top: auto; transform: translateX(-50%); }
        /* 文字位置与顶部对齐对应（容器高260px，260-top=bottom）:
         * 顶部对齐: layer-1=50px, layer-2=140px, layer-3=220px
         * 底部对齐: layer-1=210px, layer-2=120px, layer-3=40px
         */
        .swiss-card .concentric.align-bottom .layer-1 .layer-text { bottom: 210px; transform: translate(-50%, -50%); z-index: 10; }
        .swiss-card .concentric.align-bottom .layer-2 .layer-text { bottom: 120px; transform: translate(-50%, -50%); z-index: 10; }
        .swiss-card .concentric.align-bottom .layer-3 .layer-text { bottom: 40px; transform: translate(-50%, -50%); z-index: 10; }

        /* ========== 中心对齐 + 文字在圆环下方 ========== */
        /* 圆环中心对齐 */
        .swiss-card .concentric.align-center-text-bottom .layer { top: 50%; transform: translate(-50%, -50%); }
        /* 文字在各自圆环的中间位置（与变体1a相同计算，只是方向在下方）:
         * layer-1 (数据层): 在圆心正中
         * layer-2 (服务层): 在 layer-1 和 layer-2 中间 = (50+90)/2 = 70px，现在在下方
         * layer-3 (应用层): 在 layer-2 和 layer-3 中间 = (90+130)/2 = 110px，现在在下方
         */
        .swiss-card .concentric.align-center-text-bottom .layer-1 .layer-text { top: 50%; transform: translate(-50%, -50%); }
        .swiss-card .concentric.align-center-text-bottom .layer-2 .layer-text { top: calc(50% + 70px); transform: translate(-50%, -50%); }
        .swiss-card .concentric.align-center-text-bottom .layer-3 .layer-text { top: calc(50% + 110px); transform: translate(-50%, -50%); }

        /* 金字塔 - ECharts 漏斗图风格 (正三角) */
        .swiss-card .pyramid {

        /* 正三角金字塔 - 宽度递增：108, 216, 324, 432, 540 (每层增加108px，保持斜率一致) */
        .swiss-card .pyramid .level-1 {
            width: 108px;
            height: 72px;
            background: #5470c6;
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            padding-top: 12px;
        }
        .swiss-card .pyramid .level-2 {
            width: 216px;
            height: 72px;

            clip-path: polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%);
            margin-top: -1px;
        }
        .swiss-card .pyramid .level-3 {
            width: 324px;
            height: 72px;
            background: #fac858;
            /* 顶部216, 底部324 -> 54/324 = 16.67% */
            clip-path: polygon(16.67% 0%, 83.33% 0%, 100% 100%, 0% 100%);

        .swiss-card .pyramid .level-4 {
            width: 432px;
            height: 72px;

            clip-path: polygon(12.5% 0%, 87.5% 0%, 100% 100%, 0% 100%);

        .swiss-card .pyramid .level-5 {
            width: 540px;
            height: 72px;

            clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);

        /* 倒金字塔 (顶层大底层小) - 宽度递减：540, 432, 324, 216, 108 */
        .swiss-card .pyramid[data-type="inverted"] .level-1 {

        .swiss-card .pyramid[data-type="inverted"] .level-2 {

            background: #91cc75;

        .swiss-card .pyramid[data-type="inverted"] .level-3 {

        /* 鱼骨图 - 简约瑞士风格 */

            color: #fff;
            padding: 14px 28px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 16px;
            position: relative;
            z-index: 5;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .swiss-card .mind-map .branches {
            display: flex;
            justify-content: center;
            gap: 40px;
            width: 100%;
            margin-top: 50px;
            position: relative;
        }
        .swiss-card .mind-map .branches::before {
            content: '';
            position: absolute;
            top: -50px;
            left: 50%;
            width: 2px;
            height: 50px;
            background: #d95e00;
        }
        .swiss-card .mind-map .branches::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: calc(100% - 100px);
            height: 2px;
            background: #d95e00;
            transform: translateX(-50%);
        }
        .swiss-card .mind-map .branch {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .swiss-card .mind-map .branch::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            width: 2px;
            height: 20px;
            background: #d95e00;
        }
        .swiss-card .mind-map .node {
            background: #fff;
            border: 2px solid #d95e00;
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 18px;
            min-width: 100px;
            text-align: center;
            position: relative;
            box-shadow: 4px 4px 0 rgba(217,94,0,0.1);
        }

        /* 架构图 - 垂直分层 */
        .swiss-card .architecture {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 24px 0;
        }
        .swiss-card .arch-layer {
            background: rgba(26,26,26,0.03);
            border: 2px solid #1a1a1a;
            padding: 16px;
            position: relative;
        }
        .swiss-card .arch-layer::after {
            content: attr(data-layer);
            position: absolute;
            right: 12px;
            top: -10px;
            background: #1a1a1a;
            color: #fff;
            padding: 2px 8px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .swiss-card .arch-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
        }
        .swiss-card .arch-item {
            background: #fff;
            border: 1px solid #d95e00;
            padding: 12px 8px;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: #1a1a1a;
            box-shadow: 2px 2px 0 #d95e00;
        }

        /* 引用页 - 过渡页大字 */
        .swiss-card .quote-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px;
            background: #f2efe9;
            position: relative;
            min-height: 400px;
            width: 100%;
        }
        .swiss-card .quote-page::before {
            content: '"';
            position: absolute;
            top: 20px;
            left: 40px;
            font-family: 'Noto Serif SC', serif;
            font-size: 200px;
            color: rgba(217,94,0,0.08);
            line-height: 1;
        }
        .swiss-card .quote-page h1 {
            font-size: 36px;
            line-height: 1.4;
            color: #1a1a1a;
            margin-bottom: 32px;
            position: relative;
            z-index: 1;
        }
        .swiss-card .quote-page .cite {
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #d95e00;
        }

        /* 多因素对比表 */
        .swiss-card .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 12px;
            border: 2px solid #1a1a1a;
        }
        .swiss-card .comparison-table th {
            background: #1a1a1a;
            color: #fff;
            padding: 12px;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .swiss-card .comparison-table td {
            border-bottom: 1px solid #eee;
            padding: 12px;
        }
        .swiss-card .comparison-table tr:hover {
            background: rgba(217,94,0,0.03);
        }
        .swiss-card .comparison-table .score {
            color: #d95e00;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        /* SWOT - 2x2 矩阵，Swiss Style 极简设计 */
        .swiss-card .swot {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
            position: relative;
        }
        .swiss-card .swot .cell {
            padding: 24px 20px;
            font-size: 13px;
            background: #fff;
            position: relative;
            min-height: 140px;
        }
        /* 字母标识 - 大号衬线体 */
        .swiss-card .swot .cell::before {
            position: absolute;
            top: 16px;
            right: 20px;
            font-family: 'Noto Serif SC', serif;
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
            opacity: 0.12;
        }
        .swiss-card .swot .strengths::before { content: 'S'; color: #28a745; }
        .swiss-card .swot .weaknesses::before { content: 'W'; color: #dc3545; }
        .swiss-card .swot .opportunities::before { content: 'O'; color: #007bff; }
        .swiss-card .swot .threats::before { content: 'T'; color: #ffc107; }

        /* 优势 - 绿色系 */
        .swiss-card .swot .strengths {
            background: #fff;
            border-left: 4px solid #28a745;
        }
        .swiss-card .swot .strengths h4 {
            color: #28a745;
            font-family: 'Noto Serif SC', serif;
        }
        /* 劣势 - 红色系 */
        .swiss-card .swot .weaknesses {
            background: #fff;
            border-left: 4px solid #dc3545;
        }
        .swiss-card .swot .weaknesses h4 {
            color: #dc3545;
            font-family: 'Noto Serif SC', serif;
        }
        /* 机会 - 蓝色系 */
        .swiss-card .swot .opportunities {
            background: #fff;
            border-left: 4px solid #007bff;
        }
        .swiss-card .swot .opportunities h4 {
            color: #007bff;
            font-family: 'Noto Serif SC', serif;
        }
        /* 威胁 - 橙黄色系 */
        .swiss-card .swot .threats {
            background: #fff;
            border-left: 4px solid #ffc107;
        }
        .swiss-card .swot .threats h4 {
            color: #c9a227;
            font-family: 'Noto Serif SC', serif;
        }
        /* 标题样式 */
        .swiss-card .swot .cell h4 {
            font-size: 14px;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .swiss-card .swot .cell p {
            color: #444;
            line-height: 1.6;
            font-size: 13px;
            margin: 0;
        }

        /* ===== 引用页 ===== */
        .swiss-card .quote {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 48px 40px;
            position: relative;
            text-align: center;
        }

        /* 大号装饰引号 */
        .swiss-card .quote::before {
            content: '"';
            font-family: 'Noto Serif SC', serif;
            font-size: 120px;
            color: #d95e00;
            opacity: 0.12;
            line-height: 1;
            position: absolute;
            top: 30px;
            left: 30px;
            pointer-events: none;
        }

        .swiss-card .quote::after {
            content: '"';
            font-family: 'Noto Serif SC', serif;
            font-size: 120px;
            color: #d95e00;
            opacity: 0.12;
            line-height: 1;
            position: absolute;
            bottom: 10px;
            right: 30px;
            pointer-events: none;
            transform: rotate(180deg);
        }

        /* 装饰分隔线 */
        .swiss-card .quote .divider {
            width: 40px;
            height: 2px;
            background: #d95e00;
            margin-bottom: 24px;
        }

        /* 引用内容 */
        .swiss-card .quote blockquote {
            font-family: 'Noto Serif SC', serif;
            font-size: 26px;
            font-weight: 400;
            line-height: 1.7;
            color: #1a1a1a;
            margin: 0 0 32px 0;
            padding: 0;
            border: none;
            position: relative;
            z-index: 1;
        }

        /* 作者信息 */
        .swiss-card .quote .author {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .swiss-card .quote .author-name {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            font-style: normal;
        }

        .swiss-card .quote .author-title {
            font-size: 13px;
            color: #888;
            font-weight: 300;
        }

        /* 来源标注 */
        .swiss-card .quote .source {
            margin-top: 16px;
            font-size: 11px;
            color: #d95e00;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* 前后对比 */
        .swiss-card .before-after {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 16px 0;
        }
        .swiss-card .before-after .side {
            padding: 20px;
            text-align: left;
            border-radius: 8px;
        }
        .swiss-card .before-after .before {
            background: rgba(40,167,69,0.1);
            border: 1px solid #28a745;
        }
        .swiss-card .before-after .after {
            background: rgba(220,53,69,0.1);
            border: 1px solid #dc3545;
        }
        .swiss-card .before-after .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        /* Before/After 默认：Before绿色，After红色 */
        .swiss-card .before-after .before .badge { background: #28a745; color: #fff; }
        .swiss-card .before-after .after .badge { background: #dc3545; color: #fff; }

        /* 变体：带箭头的 before-after（现状→目标） */
        .swiss-card .before-after.with-arrow {
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
        }
        .swiss-card .before-after.with-arrow .arrow {
            font-size: 24px;
            color: #d95e00;
            font-weight: 700;
            padding: 0 12px;
        }
        /* 现状→目标：现状绿色，目标红色 */
        .swiss-card .before-after.with-arrow .before .badge { background: #28a745; color: #fff; }
        .swiss-card .before-after.with-arrow .after .badge { background: #dc3545; color: #fff; }

        /* 无背景色变体 */
        .swiss-card .before-after.no-bg .side {
            background: transparent;
            border: 1px solid #ddd;
        }
        .swiss-card .before-after.no-bg .before {
            border-color: #28a745;
        }
        .swiss-card .before-after.no-bg .after {
            border-color: #dc3545;
        }
        .swiss-card .before-after.no-bg .before .badge { background: transparent; color: #28a745; padding: 0; }
        .swiss-card .before-after.no-bg .after .badge { background: transparent; color: #dc3545; padding: 0; }

        /* 甘特图 - 带时间轴 */
        .swiss-card .gantt {
            margin: 20px 0;
        }
        /* 时间轴头部 */
        .swiss-card .gantt-header {
            display: flex;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(217,94,0,0.3);
        }
        .swiss-card .gantt-header .label {
            width: 80px;
            font-size: 11px;
            font-weight: 600;
            color: #666;
        }
        .swiss-card .gantt-header .timeline {
            flex: 1;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #666;
        }
        .swiss-card .gantt-header .timeline span {
            flex: 1;
            text-align: center;
            position: relative;
        }
        .swiss-card .gantt-header .timeline span::before {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -8px;
            width: 1px;
            height: 4px;
            background: rgba(217,94,0,0.3);
        }
        /* 任务行 */
        .swiss-card .gantt .task {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .swiss-card .gantt .task-name {
            width: 80px;
            font-size: 11px;
            flex-shrink: 0;
            color: #1a1a1a;
        }
        .swiss-card .gantt .task-bar {
            flex: 1;
            height: 18px;
            background: rgba(217,94,0,0.08);
            position: relative;
        }
        .swiss-card .gantt .task-bar .fill {
            position: absolute;
            height: 100%;
            background: #d95e00;
        }

        /* ===== 警告框 ===== */
        .swiss-card .alert-box {
            padding: 20px 24px;
            margin: 20px 0;
            border-radius: 0;
            position: relative;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        /* 左侧彩色边框 */
        .swiss-card .alert-box::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
        }

        /* 图标样式 */
        .swiss-card .alert-box .icon {
            font-size: 22px;
            line-height: 1;
            flex-shrink: 0;
            margin-top: 2px;
        }

        /* 内容区域 */
        .swiss-card .alert-box .content {
            flex: 1;
        }

        .swiss-card .alert-box .content .title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .swiss-card .alert-box .content p {
            font-size: 14px;
            line-height: 1.7;
            margin: 0;
            font-weight: 300;
        }

        /* 错误/危险 (红色) */
        .swiss-card .alert-box.error,
        .swiss-card .alert-box.danger {
            background: rgba(220, 53, 69, 0.08);
        }
        .swiss-card .alert-box.error::before,
        .swiss-card .alert-box.danger::before {
            background: #dc3545;
        }
        .swiss-card .alert-box.error .icon,
        .swiss-card .alert-box.danger .icon {
            color: #dc3545;
        }
        .swiss-card .alert-box.error .content .title,
        .swiss-card .alert-box.danger .content .title {
            color: #c82333;
        }
        .swiss-card .alert-box.error .content p,
        .swiss-card .alert-box.danger .content p {
            color: #721c24;
        }

        /* 警告 (黄色) */
        .swiss-card .alert-box.warning {
            background: rgba(255, 193, 7, 0.12);
        }
        .swiss-card .alert-box.warning::before {
            background: #ffc107;
        }
        .swiss-card .alert-box.warning .icon {
            color: #e0a800;
        }
        .swiss-card .alert-box.warning .content .title {
            color: #856404;
        }
        .swiss-card .alert-box.warning .content p {
            color: #533f03;
        }

        /* 信息 (蓝色) */
        .swiss-card .alert-box.info {
            background: rgba(0, 123, 255, 0.08);
        }
        .swiss-card .alert-box.info::before {
            background: #007bff;
        }
        .swiss-card .alert-box.info .icon {
            color: #007bff;
        }
        .swiss-card .alert-box.info .content .title {
            color: #004085;
        }
        .swiss-card .alert-box.info .content p {
            color: #0c5460;
        }

        /* 成功 (绿色) */
        .swiss-card .alert-box.success {
            background: rgba(40, 167, 69, 0.08);
        }
        .swiss-card .alert-box.success::before {
            background: #28a745;
        }
        .swiss-card .alert-box.success .icon {
            color: #28a745;
        }
        .swiss-card .alert-box.success .content .title {
            color: #155724;
        }
        .swiss-card .alert-box.success .content p {
            color: #0b2e13;
        }

        /* 默认警告 (橙色/主色) */
        .swiss-card .alert-box:not(.error):not(.danger):not(.warning):not(.info):not(.success) {
            background: rgba(217, 94, 0, 0.08);
        }
        .swiss-card .alert-box:not(.error):not(.danger):not(.warning):not(.info):not(.success)::before {
            background: #d95e00;
        }
        .swiss-card .alert-box:not(.error):not(.danger):not(.warning):not(.info):not(.success) .icon {
            color: #d95e00;
        }
        .swiss-card .alert-box:not(.error):not(.danger):not(.warning):not(.info):not(.success) .content .title {
            color: #d95e00;
        }

        /* ===== 术语框 ===== */
        .swiss-card .terminal-box {
            background: #fff;
            border: 2px solid #1a1a1a;
            margin: 20px 0;
            overflow: hidden;
        }

        /* 术语标签头部 */
        .swiss-card .terminal-box .term-header {
            background: #1a1a1a;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .swiss-card .terminal-box .term-header::before {
            content: '💡';
            font-size: 14px;
        }

        .swiss-card .terminal-box .term-label {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
        }

        .swiss-card .terminal-box .term-tag {
            font-size: 12px;
            font-weight: 700;
            color: #d95e00;
            margin-left: 4px;
        }

        /* 定义区域 */
        .swiss-card .terminal-box .term-section {
            padding: 16px 20px;
            border-bottom: 1px solid #e8e8e8;
        }

        .swiss-card .terminal-box .term-section:last-child {
            border-bottom: none;
        }

        .swiss-card .terminal-box .section-label {
            font-size: 11px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            display: block;
        }

        .swiss-card .terminal-box .section-content {
            font-size: 13px;
            line-height: 1.7;
            color: #444;
            margin: 0;
        }

        /* 用法：场景 → 动作 */
        .swiss-card .terminal-box .usage-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #444;
        }

        .swiss-card .terminal-box .usage-arrow {
            color: #d95e00;
            font-weight: 700;
        }

        /* 示例列表 */
        .swiss-card .terminal-box .example-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .swiss-card .terminal-box .example-list li {
            position: relative;
            padding-left: 16px;
            font-size: 13px;
            line-height: 1.7;
            color: #444;
            margin-bottom: 4px;
        }

        .swiss-card .terminal-box .example-list li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #d95e00;
            font-weight: 700;
        }

        /* ===== 标题卡 ===== */
        .swiss-card .title-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            padding: 48px 40px;
            position: relative;
        }

        /* 顶部装饰线 */
        .swiss-card .title-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: #d95e00;
        }

        /* 主标题区域 */
        .swiss-card .title-card .main-title {
            margin-top: auto;
            margin-bottom: auto;
            text-align: left;
        }

        .swiss-card .title-card .main-title h2 {
            font-family: 'Noto Serif SC', serif;
            font-size: 40px;
            font-weight: 700;
            color: #1a1a1a;
            line-height: 1.2;
            margin: 0 0 16px 0;
            padding: 0;
            border: none;
            letter-spacing: -0.02em;
        }

        /* 副标题 */
        .swiss-card .title-card .main-title .subtitle {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 17px;
            font-weight: 300;
            color: #666;
            line-height: 1.6;
            margin: 0;
        }

        /* 装饰分隔线 */
        .swiss-card .title-card .divider {
            width: 60px;
            height: 3px;
            background: #d95e00;
            margin: 32px 0;
        }

        /* 底部元信息区域 */
        .swiss-card .title-card .meta {
            margin-top: auto;
            padding-top: 32px;
            border-top: 1px solid rgba(26, 26, 26, 0.1);
        }

        .swiss-card .title-card .meta .category {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #d95e00;
            margin-bottom: 8px;
        }

        .swiss-card .title-card .meta .info {
            font-size: 12px;
            color: #888;
            font-weight: 300;
        }

        .swiss-card .title-card .meta .info span {
            margin-right: 16px;
        }

        /* ============================================
           展示类布局组件 - Display Components
           ============================================ */

        /* 1. 指标卡片 - Stat Card */
        .swiss-card .stat-card {
            background: #fff;
            border: 2px solid #1a1a1a;
            padding: 24px 28px;
            margin: 16px 0;
            position: relative;
        }

        .swiss-card .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: #d95e00;
        }

        .swiss-card .stat-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .swiss-card .stat-card-label {
            font-size: 11px;
            font-weight: 600;

        /* 3. 列表卡片 - List Card */
        .swiss-card .list-card {
            background: #fff;

        .swiss-card .list-card ol li::before {

        /* 4. 三栏布局 - Three Column */
        .swiss-card .three-col {

        .swiss-card .three-col-number {

        .swiss-card .three-col-label {

            font-weight: 600;
            letter-spacing: 0.08em;

        .swiss-card .three-col-desc {

        /* 三栏带图标 */
        .swiss-card .three-col-icon {

            display: flex;

        /* 5. 上下分层 - Split Vertical */
        .swiss-card .split-v {
            border: 2px solid #1a1a1a;
            margin: 16px 0;
            display: flex;
            flex-direction: column;

        .swiss-card .split-v-header {
            background: #1a1a1a;

            position: relative;

        .swiss-card .split-v-header::after {

        .swiss-card .split-v-body p:last-child {

        /* 带强调的头部 */
        .swiss-card .split-v.accent .split-v-header {
            background: #d95e00;
        }

        .swiss-card .split-v.accent .split-v-header::after {
            background: #fff;
        }

        .swiss-card .split-v.accent .split-v-subtitle {
            color: rgba(255, 255, 255, 0.7);
        }

        /* 带编号的头部 */
        .swiss-card .split-v-numbered .split-v-header {
            padding-left: 72px;

        .swiss-card .split-v-number {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);

            font-size: 36px;
            font-weight: 700;
            color: #d95e00;
            line-height: 1;
        }

        .swiss-card .split-v.accent .split-v-number {
            color: rgba(255, 255, 255, 0.3);
        }

        /* 网格式 */
        .swiss-card .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 16px 0;

        .swiss-card .grid .cell {
            padding: 16px;

            text-align: center;
            font-size: 13px;

        /* 布局标签 */
        .layout-label {
            display: inline-block;
            padding: 4px 10px;

            font-size: 11px;
            font-weight: 600;

            margin-bottom: 12px;
            letter-spacing: 0.05em;
        }

        /* ===== Process Loop 变体样式 ===== */
        /* 三角循环 */
        .swiss-card .process-loop[data-type="triangle"] {
            position: relative;
            width: 260px;
            height: 240px;
            margin: 20px auto;
        }
        .swiss-card .process-loop[data-type="triangle"] .loop-item {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(217,94,0,0.1);
            border: 2px solid #d95e00;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #d95e00;
        }
        .swiss-card .process-loop[data-type="triangle"] .loop-item:nth-child(1) {
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
        }
        .swiss-card .process-loop[data-type="triangle"] .loop-item:nth-child(2) {
            bottom: 20px;
            left: 20px;
        }
        .swiss-card .process-loop[data-type="triangle"] .loop-item:nth-child(3) {
            bottom: 20px;
            right: 20px;
        }
        /* 三角连接线 */
        .swiss-card .process-loop[data-type="triangle"]::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180px;
            height: 180px;
            border: 2px dashed rgba(217,94,0,0.3);
            border-radius: 50%;
            transform: translate(-50%, -40%);
        }

        /* 四角循环 - 菱形布局（上、右、下、左） */
        .swiss-card .process-loop[data-type="quad"] {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 20px auto;
        }
        .swiss-card .process-loop[data-type="quad"] .loop-item {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(217,94,0,0.1);
            border: 2px solid #d95e00;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #d95e00;
            text-align: center;
        }
        /* 上 */
        .swiss-card .process-loop[data-type="quad"] .loop-item:nth-child(1) {
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        /* 右 */
        .swiss-card .process-loop[data-type="quad"] .loop-item:nth-child(2) {
            top: 50%;
            right: 0;
            transform: translateY(-50%);
        }
        /* 下 */
        .swiss-card .process-loop[data-type="quad"] .loop-item:nth-child(3) {
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        /* 左 */
        .swiss-card .process-loop[data-type="quad"] .loop-item:nth-child(4) {
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }
        /* 四角连接线 - 虚线圆 */
        .swiss-card .process-loop[data-type="quad"]::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 170px;
            height: 170px;
            border: 2px dashed rgba(217,94,0,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* 五角循环 - 五等分圆形 */
        .swiss-card .process-loop[data-type="pentagon"] {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 20px auto;
        }
        .swiss-card .process-loop[data-type="pentagon"] .loop-item {
            position: absolute;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(217,94,0,0.1);
            border: 2px solid #d95e00;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: #d95e00;
            text-align: center;
            transform: translate(-50%, -50%);
        }
        /* 五等分圆形 - 精确三角函数计算，圆心在圆周上
           中心(130px,130px), 半径90px, 角度: -90°, -18°, 54°, 126°, 198° */
        .swiss-card .process-loop[data-type="pentagon"] .loop-item:nth-child(1) { top: calc(50% - 90px); left: 50%; }
        .swiss-card .process-loop[data-type="pentagon"] .loop-item:nth-child(2) { top: calc(50% - 28px); left: calc(50% + 86px); }
        .swiss-card .process-loop[data-type="pentagon"] .loop-item:nth-child(3) { top: calc(50% + 73px); left: calc(50% + 53px); }
        .swiss-card .process-loop[data-type="pentagon"] .loop-item:nth-child(4) { top: calc(50% + 73px); left: calc(50% - 53px); }
        .swiss-card .process-loop[data-type="pentagon"] .loop-item:nth-child(5) { top: calc(50% - 28px); left: calc(50% - 86px); }
        /* 五边形连接线 - 虚线圆 */
        .swiss-card .process-loop[data-type="pentagon"]::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180px;
            height: 180px;
            border: 2px dashed rgba(217,94,0,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* ===== 架构图样式 ===== */
        .swiss-card .architecture {

            text-transform: uppercase;
            letter-spacing: 0.1em;

            padding-bottom: 8px;
            border-bottom: 1px solid rgba(217,94,0,0.3);
        }
        .swiss-card .architecture .modules {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .swiss-card .architecture .module {
            padding: 10px 16px;
            background: rgba(217,94,0,0.08);

            font-size: 13px;

            color: #1a1a1a;
            text-align: center;

        }
        .swiss-card .architecture .module.primary {

        .swiss-card .architecture .module.secondary {
            background: rgba(217,94,0,0.15);
            border-style: dashed;
        }
        /* 层级连接线 */
        .swiss-card .architecture .layer:not(:last-child)::after {
            content: '▼';
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;

        }
