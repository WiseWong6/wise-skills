    <script>
        const editor = document.getElementById('editor');
        const cardsContainer = document.getElementById('cardsContainer');
        const pageCount = document.getElementById('pageCount');
        const preview = document.querySelector('.preview-panel');
        const saveStatus = document.getElementById('saveStatus');
        const currentFilename = document.getElementById('currentFilename');
        const unsavedIndicator = document.getElementById('unsavedIndicator');
        const fileInput = document.getElementById('fileInput');

        // 文件状态管理
        let currentFileName = 'untitled.md';
        let isModified = false;
        let autoSaveTimer = null;
        const AUTO_SAVE_DELAY = 1000; // 1秒后自动保存到 localStorage

        // 初始化时加载上次的内容
        function loadLastSession() {
            const savedContent = localStorage.getItem('swiss-editorial-content');
            const savedFileName = localStorage.getItem('swiss-editorial-filename');
            if (savedContent) {
                editor.value = savedContent;
                if (savedFileName) {
                    currentFileName = savedFileName;
                    currentFilename.textContent = currentFileName;
                }
                updateSaveStatus('已恢复上次会话');
            }
        }

        // 更新保存状态显示
        function updateSaveStatus(status, isUnsaved = false) {
            saveStatus.textContent = status;
            isModified = isUnsaved;
            if (isUnsaved) {
                unsavedIndicator.style.display = 'inline';
                saveStatus.className = 'unsaved';
            } else {
                unsavedIndicator.style.display = 'none';
                saveStatus.className = 'saved';
            }
        }

        // 标记为已修改
        function markAsModified() {
            if (!isModified) {
                updateSaveStatus('未保存', true);
            }
            // 清除之前的定时器
            clearTimeout(autoSaveTimer);
            // 设置新的自动保存定时器
            autoSaveTimer = setTimeout(() => {
                autoSave();
            }, AUTO_SAVE_DELAY);
        }

        // 自动保存到 localStorage
        function autoSave() {
            localStorage.setItem('swiss-editorial-content', editor.value);
            localStorage.setItem('swiss-editorial-filename', currentFileName);
            localStorage.setItem('swiss-editorial-autosave-time', new Date().toLocaleString());
            updateSaveStatus('自动保存于 ' + new Date().toLocaleTimeString());
        }

        // 新建文件
        function newFile() {
            if (isModified) {
                if (!confirm('当前文件有未保存的更改，确定要新建文件吗？')) {
                    return;
                }
            }
            editor.value = '# 新建文档\n\n开始编写内容...';
            currentFileName = 'untitled.md';
            currentFilename.textContent = currentFileName;
            updateSaveStatus('新文件');
            renderCards();
            // 保存新状态
            autoSave();
        }

        // 打开文件
        function openFile(input) {
            const file = input.files[0];
            if (!file) return;

            if (isModified) {
                if (!confirm('当前文件有未保存的更改，确定要打开新文件吗？')) {
                    input.value = '';
                    return;
                }
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                editor.value = e.target.result;
                currentFileName = file.name;
                currentFilename.textContent = currentFileName;
                updateSaveStatus('已打开');
                renderCards();
                autoSave();
            };
            reader.readAsText(file);
            input.value = ''; // 清空input，允许重复选择同一文件
        }

        // 保存文件
        function saveFile() {
            const content = editor.value;
            const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = currentFileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            updateSaveStatus('已保存');
            autoSave(); // 同时保存到 localStorage
        }

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            // Ctrl/Cmd + S = 保存
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveFile();
            }
            // Ctrl/Cmd + O = 打开
            if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
                e.preventDefault();
                fileInput.click();
            }
            // Ctrl/Cmd + N = 新建
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                e.preventDefault();
                newFile();
            }
        });

        // 监听编辑器输入，标记修改状态
        editor.addEventListener('input', function() {
            markAsModified();
        });

        // ========== 搜索功能 ==========
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        let searchMatches = [];
        let currentMatchIndex = -1;

        // 处理搜索框键盘事件
        function handleSearchKeydown(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (e.shiftKey) {
                    findPrev();
                } else {
                    findNext();
                }
            } else if (e.key === 'Escape') {
                clearSearch();
                searchInput.blur();
            }
        }

        // 劫持原生的 Ctrl+F
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                e.preventDefault();
                searchInput.focus();
                searchInput.select();
            }
        });

        // 执行搜索
        function performSearch() {
            const query = searchInput.value.trim().toLowerCase();
            clearHighlights();
            
            if (!query) {
                searchMatches = [];
                currentMatchIndex = -1;
                updateSearchResults();
                return;
            }

            searchMatches = [];
            const cards = document.querySelectorAll('.swiss-card');
            
            cards.forEach((card, cardIndex) => {
                const walker = document.createTreeWalker(
                    card,
                    NodeFilter.SHOW_TEXT,
                    null,
                    false
                );

                const textNodes = [];
                let node;
                while (node = walker.nextNode()) {
                    if (node.parentElement.tagName !== 'SCRIPT' && 
                        node.parentElement.tagName !== 'STYLE') {
                        textNodes.push(node);
                    }
                }

                textNodes.forEach(textNode => {
                    const text = textNode.textContent.toLowerCase();
                    let index = text.indexOf(query);
                    
                    while (index !== -1) {
                        searchMatches.push({
                            cardIndex: cardIndex,
                            textNode: textNode,
                            startOffset: index,
                            endOffset: index + query.length,
                            text: textNode.textContent.substring(index, index + query.length)
                        });
                        index = text.indexOf(query, index + 1);
                    }
                });
            });

            // 高亮所有匹配
            highlightMatches();
            
            if (searchMatches.length > 0) {
                currentMatchIndex = 0;
                navigateToMatch(0);
            }
            
            updateSearchResults();
        }

        // 高亮所有匹配
        function highlightMatches() {
            searchMatches.forEach((match, index) => {
                const range = document.createRange();
                range.setStart(match.textNode, match.startOffset);
                range.setEnd(match.textNode, match.endOffset);

                const span = document.createElement('span');
                span.className = 'search-highlight';
                span.dataset.matchIndex = index;
                
                try {
                    range.surroundContents(span);
                    match.element = span;
                } catch (e) {
                    // 跨元素匹配时跳过
                }
            });
        }

        // 清除高亮
        function clearHighlights() {
            document.querySelectorAll('.search-highlight, .search-highlight-current').forEach(el => {
                const parent = el.parentNode;
                parent.replaceChild(document.createTextNode(el.textContent), el);
                parent.normalize();
            });
        }

        // 清除搜索
        function clearSearch() {
            searchInput.value = '';
            clearHighlights();
            searchMatches = [];
            currentMatchIndex = -1;
            updateSearchResults();
        }

        // 跳转到指定匹配
        function navigateToMatch(index) {
            if (index < 0 || index >= searchMatches.length) return;

            // 移除之前的高亮
            document.querySelectorAll('.search-highlight-current').forEach(el => {
                el.classList.remove('search-highlight-current');
            });

            const match = searchMatches[index];
            if (match && match.element) {
                match.element.classList.add('search-highlight-current');
                
                // 滚动到对应卡片
                const cards = document.querySelectorAll('.swiss-card');
                if (cards[match.cardIndex]) {
                    const card = cards[match.cardIndex];
                    const cardTop = card.offsetTop;
                    preview.scrollTo({ top: cardTop - 40, behavior: 'smooth' });
                    
                    // 更新目录高亮
                    updateTocActiveState(match.cardIndex);
                    
                    // 滚动匹配元素到视野中央
                    setTimeout(() => {
                        match.element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 300);
                }
                
                // 同步滚动右侧 Markdown 编辑器到对应位置
                scrollEditorToMatch(match.text);
            }
            
            currentMatchIndex = index;
            updateSearchResults();
        }

        // 在 Markdown 编辑器中滚动到匹配文本
        function scrollEditorToMatch(searchText) {
            if (!searchText) return;
            
            const editorValue = editor.value;
            const searchLower = searchText.toLowerCase();
            const editorLower = editorValue.toLowerCase();
            
            // 查找文本在编辑器中的位置
            let index = editorLower.indexOf(searchLower);
            
            // 如果找到多个，尝试找到当前卡片对应的位置
            // 通过 cardIndex 来大致定位：按 --- 分割后找对应 section
            if (currentMatchIndex >= 0 && searchMatches[currentMatchIndex]) {
                const targetCardIndex = searchMatches[currentMatchIndex].cardIndex;
                const sections = editorValue.split(/^---$/m);
                
                if (sections[targetCardIndex]) {
                    // 计算前面所有 section 的字符数
                    let charOffset = 0;
                    for (let i = 0; i < targetCardIndex; i++) {
                        charOffset += sections[i].length + 4; // 4 for "\n---\n"
                    }
                    
                    // 在当前 section 中查找
                    const sectionText = sections[targetCardIndex];
                    const sectionIndex = sectionText.toLowerCase().indexOf(searchLower);
                    
                    if (sectionIndex !== -1) {
                        index = charOffset + sectionIndex;
                    }
                }
            }
            
            if (index !== -1) {
                // 计算行号
                const linesBefore = editorValue.substring(0, index).split('\n');
                const lineNumber = linesBefore.length;
                const lineHeight = 25.2; // 14px font-size * 1.8 line-height
                
                // 滚动到对应行（居中显示）
                const scrollTop = (lineNumber - 5) * lineHeight;
                editor.scrollTo({ top: Math.max(0, scrollTop), behavior: 'smooth' });
                
                // 临时高亮编辑器中的文本
                highlightEditorText(index, searchText.length);
            }
        }

        // 临时高亮编辑器中的文本（通过创建选区）
        let editorHighlightTimeout;
        function highlightEditorText(startIndex, length) {
            clearTimeout(editorHighlightTimeout);
            
            try {
                editor.setSelectionRange(startIndex, startIndex + length);
                editor.focus();
            } catch (e) {
                // 忽略设置选区失败的情况
            }
            
            // 3秒后取消选区
            editorHighlightTimeout = setTimeout(() => {
                editor.setSelectionRange(0, 0);
            }, 3000);
        }

        // 查找下一个
        function findNext() {
            if (searchMatches.length === 0) {
                performSearch();
                return;
            }
            const nextIndex = (currentMatchIndex + 1) % searchMatches.length;
            navigateToMatch(nextIndex);
        }

        // 查找上一个
        function findPrev() {
            if (searchMatches.length === 0) {
                performSearch();
                return;
            }
            const prevIndex = (currentMatchIndex - 1 + searchMatches.length) % searchMatches.length;
            navigateToMatch(prevIndex);
        }

        // 更新搜索结果显示
        function updateSearchResults() {
            if (searchMatches.length === 0) {
                if (searchInput.value.trim()) {
                    searchResults.textContent = '未找到';
                } else {
                    searchResults.textContent = '';
                }
            } else {
                searchResults.textContent = `${currentMatchIndex + 1} / ${searchMatches.length}`;
            }
        }

        // 监听搜索输入
        let searchTimeout;
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(performSearch, 300);
        });

        // 目录高亮状态管理
        let lastActivePage = -1;
        let isClickScrolling = false;
        let clickScrollTimeout = null;
        let cardObserver = null;

        // 跳转到指定页面
        function scrollToPage(pageIndex) {
            const cards = document.querySelectorAll('.swiss-card');
            if (cards[pageIndex]) {
                isClickScrolling = true;
                clearTimeout(clickScrollTimeout);
                // 立即更新高亮，不闪烁
                updateTocActiveState(pageIndex);
                // 计算卡片相对于 preview-panel 的偏移量并滚动
                const card = cards[pageIndex];
                const cardTop = card.offsetTop;
                preview.scrollTo({ top: cardTop - 40, behavior: 'smooth' }); // 40px padding
                // 保存滚动位置
                localStorage.setItem('swiss-editorial-scroll', (cardTop - 40).toString());
                localStorage.setItem('swiss-editorial-page', pageIndex.toString());
                // 滚动结束后恢复监听
                clickScrollTimeout = setTimeout(() => {
                    isClickScrolling = false;
                }, 600);
            }
        }

        // 更新目录激活状态（不闪烁）
        function updateTocActiveState(activePage) {
            if (activePage === lastActivePage) return;
            lastActivePage = activePage;

            document.querySelectorAll('.toc-page').forEach((page, idx) => {
                const shouldActive = idx === activePage;
                if (page.classList.contains('active') !== shouldActive) {
                    page.classList.toggle('active', shouldActive);
                }
            });
            document.querySelectorAll('.toc-element').forEach(el => {
                const shouldActive = parseInt(el.dataset.page) === activePage;
                if (el.classList.contains('active') !== shouldActive) {
                    el.classList.toggle('active', shouldActive);
                }
            });
        }

        // 生成页面大纲
        function updateToc() {
            const md = editor.value;
            const pages = md.split(/^---$/m);
            const tocTree = document.getElementById('tocTree');

            if (!tocTree) return;

            if (pages.length === 0 || (pages.length === 1 && !pages[0].trim())) {
                tocTree.innerHTML = '<div class="toc-empty">开始编写内容以生成大纲...</div>';
                return;
            }

            const layoutPatterns = [
                { name: '对比网格', pattern: /vs-grid/ },
                { name: '指标卡片', pattern: /stat-card/ },
                { name: '雷达图', pattern: /radar/ },
                { name: '列表卡片', pattern: /list-card/ },
                { name: '三栏布局', pattern: /three-col/ },
                { name: '上下分层', pattern: /split-v/ },
                { name: '流程链', pattern: /process-chain/ },
                { name: '循环流程', pattern: /process-loop/ },
                { name: '矩阵网格', pattern: /matrix-grid/ },
                { name: '时间轴', pattern: /timeline/ },
                { name: '同心层', pattern: /concentric/ },
                { name: '金字塔', pattern: /pyramid/ },
                { name: '鱼骨图', pattern: /fishbone/ },
                { name: '冰山', pattern: /iceberg/ },
                { name: '旅程', pattern: /journey/ },
                { name: '韦恩图', pattern: /venn/ },
                { name: 'SWOT分析', pattern: /swot/ },
                { name: '前后对比', pattern: /before-after/ },
                { name: '甘特图', pattern: /gantt/ },
                { name: '代码块', pattern: /code-block/ },
                { name: '警告框', pattern: /alert-box/ },
                { name: '术语框', pattern: /terminal-box/ },
                { name: '标题页', pattern: /title-card/ },
                { name: '左右两栏', pattern: /two-col/ },
                { name: '网格', pattern: /\.grid[^-]/ },
                { name: '引用页', pattern: /\.quote/ }
            ];

            let html = '';
            pages.forEach((page, index) => {
                const lines = page.trim().split('\n');
                let title = '';
                let elements = [];

                // 提取标题
                for (const line of lines) {
                    const h1Match = line.match(/^# (.+)$/);
                    const h2Match = line.match(/^## (.+)$/);
                    if (h1Match) {
                        title = h1Match[1];
                        break;
                    } else if (h2Match && !title) {
                        title = h2Match[1];
                    }
                }

                // 识别布局组件
                for (const { name, pattern } of layoutPatterns) {
                    if (pattern.test(page)) {
                        elements.push(name);
                    }
                }

                // 识别基础元素
                if (/^> /m.test(page)) elements.push('引用块');
                if (/^```/m.test(page)) elements.push('代码块');
                if (/^\|[^|]+\|[^|]+\|/m.test(page)) elements.push('表格');
                if (/^\[alt\]/m.test(page)) elements.push('极简表格');
                if (/- \[x\] /m.test(page)) elements.push('待办列表');

                const displayTitle = title || (index === 0 ? '封面' : `第 ${index} 页`);
                const elementText = elements.length > 0 ? `${elements.length} 个组件` : '正文';

                html += `
                    <div class="toc-page" data-page="${index}">
                        <div class="toc-page-header" onclick="scrollToPage(${index})">
                            <span class="toc-page-number">${index === 0 ? '封面' : index}</span>
                            <span class="toc-page-title">${displayTitle}</span>
                            <span class="toc-page-preview">${elementText}</span>
                        </div>
                        ${elements.length > 0 ? `
                            <div class="toc-elements">
                                ${elements.map((el, elIndex) => `<div class="toc-element" data-page="${index}" data-el-index="${elIndex}" onclick="scrollToPage(${index})">${el}</div>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            });

            tocTree.innerHTML = html;
        }

        // 配色方案
        const SCHEME = {
            cover: { bg: '#f2efe9', text: '#1a1a1a', accent: '#d95e00' },
            body: { bg: '#ffffff', text: '#1a1a1a', accent: '#d95e00' }
        };

        // 简单 Markdown 解析器
        function parseMarkdown(md) {
            let html = md;

            // 代码块 - macOS 窗口风格
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                const langLabel = lang || 'text';
                return `<div class="code-block"><div class="code-header"><div class="code-dots"><span class="code-dot red"></span><span class="code-dot yellow"></span><span class="code-dot green"></span></div><span class="code-lang">${langLabel}</span></div><pre><code>${escapeHtml(code.trim())}</code></pre></div>`;
            });

            // 处理标题 - 从多到少依次匹配
            html = html.replace(/^###### (.+)$/gm, '<h6>$1</h6>');
            html = html.replace(/^##### (.+)$/gm, '<h5>$1</h5>');
            html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

            // 加粗和强调
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

            // 行内代码
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // 链接
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

            // 分割线
            html = html.replace(/^---$/gm, '<hr>');

            // 引用块 - 多行引用支持
            html = html.replace(/(^> .+\n?)+/gm, (match) => {
                const lines = match.trim().split('\n').map(line => line.replace(/^> /, ''));
                return `<blockquote><p>${lines.join('</p><p>')}</p></blockquote>`;
            });

            // 无序列表
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*?<\/li>\n?)+/g, '<ul>$&</ul>');

            // 有序列表
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

            // 图片
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');

            // 表格 - 支持 [alt] 标记切换极简样式
            let tableAltMode = false;
            html = html.replace(/^\[alt\]$/gm, () => {
                tableAltMode = true;
                return '';
            });
            // 匹配完整的表格块（多行）
            html = html.replace(/(\|[^\n]+\|\n?)+/g, (match) => {
                const lines = match.trim().split('\n');
                let headerRow = '';
                let bodyRows = [];
                let foundDivider = false;

                for (const line of lines) {
                    if (!line.includes('|')) continue;
                    const cells = line.split('|').map(c => c.trim()).filter(c => c);
                    // 检测分割线
                    if (cells.every(c => /^[-:]+$/.test(c))) {
                        foundDivider = true;
                        continue;
                    }
                    // 构建单元格 HTML
                    const cellHtml = cells.map(c => `<td>${c}</td>`).join('');
                    const rowHtml = `<tr>${cellHtml}</tr>`;

                    if (!foundDivider) {
                        headerRow = rowHtml;
                    } else {
                        bodyRows.push(rowHtml);
                    }
                }

                if (!headerRow || bodyRows.length === 0) return match;

                // 表头用 th
                const thead = headerRow.replace(/<td>/g, '<th>').replace(/<\/td>/g, '</th>');
                const tbody = bodyRows.join('');
                const altClass = tableAltMode ? ' class="alt"' : '';
                tableAltMode = false;
                return `<table${altClass}><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
            });

            // 段落
            html = html.replace(/\n\n+/g, '</p><p>');
            html = '<p>' + html + '</p>';

            // 清理空段落
            html = html.replace(/<p>\s*<\/p>/g, '');
            html = html.replace(/<p>(<h[1-6]>)/g, '$1');
            html = html.replace(/(<\/h[1-6]>)<\/p>/g, '$1');
            html = html.replace(/<p>(<ul>)/g, '$1');
            html = html.replace(/(<\/ul>)<\/p>/g, '$1');
            html = html.replace(/<p>(<ol>)/g, '$1');
            html = html.replace(/(<\/ol>)<\/p>/g, '$1');
            html = html.replace(/<p>(<pre>)/g, '$1');
            html = html.replace(/(<\/pre>)<\/p>/g, '$1');
            html = html.replace(/<p>(<blockquote>)/g, '$1');
            html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');
            html = html.replace(/<p>(<table>)/g, '$1');
            html = html.replace(/(<\/table>)<\/p>/g, '$1');
            html = html.replace(/<p>(<hr>)<\/p>/g, '$1');
            html = html.replace(/<p>(<img>)/g, '$1');
            html = html.replace(/(<\/img>)<\/p>/g, '$1');
            // code-block 也不应该被 p 包裹
            html = html.replace(/<p>(<div class="code-block">)/g, '$1');
            html = html.replace(/(<\/div>)<\/p>/g, '$1');

            // 布局 div 也不应该被 p 包裹 - 通用匹配
            // 匹配任何以 vs-, process-, stat-, timeline, concentric, pyramid, fishbone, iceberg, journey, venn, swot, quote, radar, before-after, gantt, alert-box, terminal-box, title-card, list-card, grid-, split-, two-, three- 开头的 class
            html = html.replace(/<p>(<div class="(vs-grid|process-chain|process-loop|matrix-grid|stat-card|timeline|concentric|pyramid|fishbone|iceberg|journey|venn|swot|quote|radar|before-after|gantt|alert-box|terminal-box|title-card|list-card|grid-layout|split-v|two-col|three-col)">)/g, '$1');
            // 匹配对应的结束标签
            html = html.replace(/(<\/div>)<\/p>/g, '$1');

            return html;
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // 页面最大高度 (800px - padding)
        const PAGE_MAX_HEIGHT = 720;

        // 创建临时测量容器
        function createMeasureContainer() {
            const container = document.createElement('div');
            container.style.cssText = `
                position: absolute;
                left: -9999px;
                top: -9999px;
                width: 600px;
                padding: 40px;
                box-sizing: border-box;
                visibility: hidden;
                pointer-events: none;
            `;
            document.body.appendChild(container);
            return container;
        }

        // 按块级元素分割内容
        function splitContentIntoBlocks(html) {
            const blocks = [];
            // 匹配各种块级元素 - 不使用 s 标志，用 [\s\S] 代替 .
            const blockRegex = /<(h[1-6]|p|ul|ol|pre|blockquote|div|table|hr|img)[^>]*>[\s\S]*?<\/\1>/g;

            let match;
            let lastIndex = 0;

            while ((match = blockRegex.exec(html)) !== null) {
                if (match.index > lastIndex) {
                    const text = html.slice(lastIndex, match.index).trim();
                    if (text) blocks.push({ type: 'text', content: text });
                }
                blocks.push({ type: 'element', content: match[0] });
                lastIndex = match.index + match[0].length;
            }

            if (lastIndex < html.length) {
                const text = html.slice(lastIndex).trim();
                if (text) blocks.push({ type: 'text', content: text });
            }

            return blocks;
        }

        // 测量内容高度
        function measureContentHeight(content, measureContainer) {
            measureContainer.innerHTML = `<div class="swiss-card swiss-card--body"><div class="swiss-card__content">${content}</div></div>`;
            const card = measureContainer.querySelector('.swiss-card');
            const height = card.offsetHeight;
            const contentHeight = card.querySelector('.swiss-card__content').offsetHeight;
            return { cardHeight: height, contentHeight };
        }

        // 自动分页逻辑
        function generateCards(md) {
            // 按 --- 分割sections
            const sections = md.split(/\n---\n/);
            const cards = [];
            const measureContainer = createMeasureContainer();

            try {
                sections.forEach((section, index) => {
                    const content = parseMarkdown(section.trim());
                    const isCover = index === 0 && section.trim().startsWith('#');

                    if (isCover) {
                        // 封面：标题 + 日期
                        const titleMatch = content.match(/<h1>([^<]+)<\/h1>/);
                        const title = titleMatch ? titleMatch[1] : '';
                        const body = content.replace(/<h1>[^<]+<\/h1>/, '').replace(/<p><\/p>/g, '');

                        cards.push({
                            type: 'cover',
                            html: `<h1>${title}</h1>${body}<div class="cover-meta">Swiss Editorial</div><div class="cover-date">${new Date().toLocaleDateString('zh-CN')}</div>`
                        });
                    } else if (content.trim()) {
                        // 检查内容高度
                        const { cardHeight } = measureContentHeight(content, measureContainer);

                        if (cardHeight <= PAGE_MAX_HEIGHT + 80) {
                            // 内容未超出限制，直接添加
                            cards.push({
                                type: 'body',
                                html: content
                            });
                        } else {
                            // 需要分页
                            const blocks = splitContentIntoBlocks(content);
                            let currentPageContent = '';

                            for (const block of blocks) {
                                const testContent = currentPageContent + block.content;
                                const { cardHeight: testHeight } = measureContentHeight(testContent, measureContainer);

                                if (testHeight <= PAGE_MAX_HEIGHT + 80) {
                                    // 可以加入当前页
                                    currentPageContent = testContent;
                                } else {
                                    // 当前页已满，保存并开始新页
                                    if (currentPageContent.trim()) {
                                        cards.push({
                                            type: 'body',
                                            html: currentPageContent
                                        });
                                    }
                                    currentPageContent = block.content;
                                }
                            }

                            // 添加最后一页
                            if (currentPageContent.trim()) {
                                cards.push({
                                    type: 'body',
                                    html: currentPageContent
                                });
                            }
                        }
                    }
                });
            } finally {
                document.body.removeChild(measureContainer);
            }

            return cards;
        }

        // 渲染卡片
        function renderCards() {
            const md = editor.value;
            const cards = generateCards(md);

            cardsContainer.innerHTML = cards.map((card, i) => `
                <div class="swiss-card swiss-card--${card.type}" data-page="${i}">
                    <div class="swiss-card__content">
                        ${card.html}
                    </div>
                </div>
            `).join('');

            pageCount.textContent = `${cards.length} 页`;

            // 更新目录
            updateToc();

            // 初始化 IntersectionObserver
            initCardObserver();

            // 恢复滚动位置
            restoreScrollPosition();
        }

        // 初始化 IntersectionObserver 监听卡片可见性
        function initCardObserver() {
            if (cardObserver) {
                cardObserver.disconnect();
            }
            const cards = document.querySelectorAll('.swiss-card');
            if (cards.length === 0) return;

            // 使用 IntersectionObserver 监听卡片进入视口
            cardObserver = new IntersectionObserver((entries) => {
                if (isClickScrolling) return;
                // 找到最靠近顶部的可见卡片
                let topmostVisible = null;
                let minTop = Infinity;
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const rect = entry.target.getBoundingClientRect();
                        const containerRect = preview.getBoundingClientRect();
                        const relativeTop = rect.top - containerRect.top;
                        if (relativeTop < minTop && relativeTop >= -100) {
                            minTop = relativeTop;
                            topmostVisible = parseInt(entry.target.dataset.pageIndex);
                        }
                    }
                });
                if (topmostVisible !== null) {
                    updateTocActiveState(topmostVisible);
                    localStorage.setItem('swiss-editorial-page', topmostVisible.toString());
                }
            }, {
                root: preview,
                rootMargin: '-10% 0px -70% 0px',
                threshold: 0
            });

            cards.forEach((card, index) => {
                card.dataset.pageIndex = index;
                cardObserver.observe(card);
            });
        }

        // 保存滚动位置
        function saveScrollPosition() {
            const scrollTop = preview.scrollTop;
            localStorage.setItem('swiss-editorial-scroll', scrollTop.toString());
        }

        // 恢复滚动位置
        function restoreScrollPosition() {
            const savedPage = localStorage.getItem('swiss-editorial-page');
            const savedScroll = localStorage.getItem('swiss-editorial-scroll');
            const cards = document.querySelectorAll('.swiss-card');

            if (savedPage && cards[parseInt(savedPage)]) {
                // 优先恢复到保存的页面
                const pageIndex = parseInt(savedPage);
                cards[pageIndex].scrollIntoView({ behavior: 'instant', block: 'start' });
                updateTocActiveState(pageIndex);
            } else if (savedScroll) {
                preview.scrollTop = parseInt(savedScroll, 10);
            }
        }

        // 监听滚动保存位置（节流）
        let scrollTimeout;
        preview.addEventListener('scroll', () => {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(saveScrollPosition, 150);
        }, { passive: true });

        // 监听窗口大小变化
        window.addEventListener('resize', () => {
            initCardObserver();
        });

        // 页面加载前保存位置
        window.addEventListener('beforeunload', saveScrollPosition);

        // 实时预览
        editor.addEventListener('input', renderCards);

        // 加载上次会话
        loadLastSession();
        
        // 初始渲染
        renderCards();
    </script>
</body>
</html>
