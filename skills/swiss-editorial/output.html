<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss Editorial - UI Previewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d95e00;
            --bg-dark: #0f0f0f;
            --sidebar-bg: #1a1a1a;
            --border-color: #333;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --card-w: 600px;
            --card-h: 800px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* 1. 左侧目录 Directory */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .sidebar-header h1 {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--primary);
            text-transform: uppercase;
        }

        .dir-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }

        .dir-item {
            padding: 10px 20px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dir-item:hover {
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }

        .dir-item.active {
            color: #fff;
            background: rgba(217,94,0,0.15);
            border-left: 3px solid var(--primary);
        }

        /* 2. 中间源码 Source */
        .source-pane {
            flex: 1;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background: #121212;
            min-width: 400px;
        }

        .pane-header {
            height: 48px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
        }

        .code-editor {
            flex: 1;
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #d1d1d1;
            white-space: pre;
            overflow: auto;
            outline: none;
        }

        /* 3. 右侧渲染 Render */
        .render-pane {
            flex: 1.5;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 40px;
        }

        .preview-frame {
            width: var(--card-w);
            height: var(--card-h);
            background: #fff;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            position: relative;
            transform-origin: center;
            transition: transform 0.3s ease;
        }

        /* 手机/平板预览模式模拟 */
        @media (max-width: 1400px) {
            .preview-frame {
                transform: scale(0.8);
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>

            * { margin: 0; padding: 0; box-sizing: border-box; }

            .vs-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; align-items: center; margin: 40px 0; }
            .vs-divider { font-family: 'Noto Serif SC', serif; font-size: 48px; font-weight: 900; color: rgba(217,94,0,0.2); font-style: italic; }
            .vs-card { border: 1px solid #eee; padding: 20px; background: #fafafa; height: 100%; }
            .vs-card h4 { font-size: 20px; margin-bottom: 10px; color: #1a1a1a; }

            /* process-chain */
            .process-chain { display: flex; align-items: center; gap: 10px; margin: 30px 0; }
            .step { background: #1a1a1a; color: #fff; padding: 10px 15px; font-size: 14px; font-weight: 600; text-align: center; flex: 1; }
            .arrow { color: #d95e00; font-weight: bold; font-size: 20px; }
            
            /* pyramid */
            .pyramid { display: flex; flex-direction: column; align-items: center; margin: 40px 0; }
            .level { display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; font-size: 13px; position: relative; height: 50px; margin-top: -1px; }
            .level-1 { width: 80px; clip-path: polygon(50% 0%, 100% 100%, 0% 100%); background: #1a1a1a; padding-top: 15px; }
            .level-2 { width: 160px; clip-path: polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%); background: #333; }
            .level-3 { width: 240px; clip-path: polygon(16.67% 0%, 83.33% 0%, 100% 100%, 0% 100%); background: #d95e00; }
            .level-4 { width: 320px; clip-path: polygon(12.5% 0%, 87.5% 0%, 100% 100%, 0% 100%); background: #555; }

            /* Stat Cards */
            .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }

            .stat-value { font-size: 36px; font-weight: 700; color: #1a1a1a; margin: 5px 0; }
            .stat-trend { font-size: 12px; font-weight: 700; }
            .up { color: #2e7d32; } .down { color: #c62828; }

            .timeline { border-left: 2px solid #d95e00; margin-left: 20px; padding-left: 30px; position: relative; }

            .time-year { font-weight: 700; color: #1a1a1a; margin-bottom: 5px; }

            .concentric { display: flex; justify-content: center; align-items: center; height: 350px; position: relative; }

            /* Matrix */
            .matrix { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 4px; margin: 30px 0; background: #eee; border: 4px solid #eee; }
            .m-cell { background: #fff; padding: 20px; min-height: 120px; }
            .m-cell h5 { color: #d95e00; margin-bottom: 8px; font-size: 14px; }

            /* Table */
            table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 14px; }
            th { background: #1a1a1a; color: #fff; padding: 12px; text-align: left; }
            td { border-bottom: 1px solid #eee; padding: 12px; }
            tr:nth-child(even) { background: #fafafa; }

            /* Code */
            .code-box { background: #1a1a1a; color: #f2efe9; padding: 25px; font-family: 'SF Mono', monospace; font-size: 13px; line-height: 1.6; margin: 20px 0; }
        `;

        function updatePreview(key) {
            const template = templates[key] || templates['cover'];
            const doc = iframe.contentDocument;
            doc.open();
            doc.write(`<style>${baseStyles}</style>${template.html}`);
            doc.close();
            
            // 转义 HTML 以便在源码视图中显示
            codeEditor.textContent = template.html.replace(/></g, '>\n<');
        }

        dirItems.forEach(item => {
            item.addEventListener('click', () => {
                dirItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                updatePreview(item.dataset.target);
            });
        });

        // 初始加载
        updatePreview('p01');
    </script>
</body>
</html>
